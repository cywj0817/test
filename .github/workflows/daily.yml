name: Daily Stock Report

on:
  schedule:
    # 매일 한국시간 오전 7시 = UTC 22:00 (전날)
    - cron: '0 22 * * *'
  workflow_dispatch:  # GitHub UI에서 수동 실행 가능

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate HTML report
        run: |
          python screener.py --top 10 --with-news --html docs/index.html

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --quiet --cached || git commit -m "Daily report: $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')"
          git push
